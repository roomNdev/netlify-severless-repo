<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jamstack Explorers - Up and Running with Serverless Functions</title>
  </head>

  <body>
    <h1>Up and Running with Serverless Functions</h1>
    <button id="fetch-btn">Fetch</button>
    <button id="fetch-ebay-sell">Fetch eBay Sell</button>
    <p id="response-output">Response Placeholder</p>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const fetchBtn = document.getElementById('fetch-btn')

        const fetchEbaySellBtn = document.getElementById('fetch-ebay-sell')
        const responseText = document.getElementById('response-output')


        fetchBtn.addEventListener('click', async () => {
          const url = '/.netlify/functions/comps?q=drone';
          const response = await fetch(url);
          const data = await response.json()
          responseText.innerText = JSON.stringify(data, null, 2)
        })

        fetchEbaySellBtn.addEventListener('click', async () => {
          const url = '/.netlify/functions/ebaySales?q=drone';
          const response = await fetch(url);
          const data = await response.json()
          responseText.innerText = JSON.stringify(data, null, 2)
        })

      })
    </script>
  </body>

</html>
